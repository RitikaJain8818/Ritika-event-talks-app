<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track the latest BigQuery release notes and features, search updates, filter by categories, and easily compose and publish updates to Twitter/X.">
    <title>BigQuery Release Sentinel | Modern Update Hub</title>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zm5-6.5h-10V7h10v4z"/>
                    </svg>
                </div>
                <div>
                    <h1>BigQuery Release Sentinel</h1>
                </div>
            </div>
            
            <div class="controls-section">
                <span class="last-updated-text">Fetched: <span id="last-updated">Never</span></span>
                <button id="refresh-btn" class="btn-refresh" aria-label="Refresh release notes feed">
                    <svg viewBox="0 0 24 24">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-wrapper">
        <!-- Search & Filter Controls -->
        <section class="search-filter-panel">
            <div class="search-row">
                <div class="search-input-wrapper">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search features, keywords, SQL functions, dates..." aria-label="Search release notes">
                </div>
                <select id="sort-select" class="sort-select" aria-label="Sort order">
                    <option value="desc">Newest First</option>
                    <option value="asc">Oldest First</option>
                </select>
            </div>
            
            <div class="category-filters" id="category-filters">
                <span class="filter-label">Filter:</span>
                <!-- Filled dynamically by JavaScript -->
            </div>
        </section>

        <!-- Releases Grid -->
        <section id="releases-container" class="releases-container">
            <!-- Skeleton cards will be loaded here, and then replaced with real notes -->
        </section>
    </main>

    <!-- Floating Tweet Side Panel -->
    <aside id="tweet-panel" class="tweet-panel" aria-label="Tweet composer panel">
        <div class="tweet-panel-header">
            <h2 class="tweet-panel-title">Tweet Composer</h2>
            <button id="close-panel-btn" class="btn-close-panel" aria-label="Close tweet panel">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
        </div>

        <div class="tweet-composer-area">
            <div class="tweet-textarea-wrapper">
                <textarea id="tweet-textarea" class="tweet-textarea" placeholder="Selected update content will load here... Feel free to customize!" aria-label="Tweet text content"></textarea>
            </div>

            <!-- Stats & Progress Bar -->
            <div class="tweet-stats">
                <div class="character-progress-bar-wrapper">
                    <div id="char-progress-bar" class="character-progress-bar"></div>
                </div>
                <span id="char-count" class="character-count">0 / 280</span>
            </div>

            <!-- Tone / Style Options -->
            <div class="style-options">
                <span class="style-options-title">Post Format</span>
                <div class="style-grid">
                    <button class="btn-style active" data-style="bullet">🚀 Feature Emoji</button>
                    <button class="btn-style" data-style="highlight">🔥 Hot Highlight</button>
                    <button class="btn-style" data-style="promo">🛠️ Corporate</button>
                </div>
            </div>

            <!-- Quick Hashtag Toggle -->
            <div class="hashtag-section">
                <span class="style-options-title">Add Hashtags</span>
                <div class="hashtags-grid">
                    <button class="hashtag-pill" data-tag="GoogleCloud">#GoogleCloud</button>
                    <button class="hashtag-pill" data-tag="BigQuery">#BigQuery</button>
                    <button class="hashtag-pill" data-tag="DataAnalytics">#DataAnalytics</button>
                    <button class="hashtag-pill" data-tag="SQL">#SQL</button>
                    <button class="hashtag-pill" data-tag="TechNews">#TechNews</button>
                </div>
            </div>

            <!-- Launch Button -->
            <button id="launch-tweet-btn" class="btn-tweet-launch" aria-label="Publish to X/Twitter">
                <svg viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                <span>Post on X</span>
            </button>
        </div>
    </aside>

    <!-- Footer -->
    <footer>
        <p>BigQuery Release Sentinel &copy; 2026. Feeds fetched from <a href="https://docs.cloud.google.com/feeds/bigquery-release-notes.xml" target="_blank" rel="noopener noreferrer">Google Cloud Feed</a>.</p>
    </footer>

    <!-- App Script -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
